# Local dev MySQL — futtatás: `docker compose up -d`
# Megáll: `docker compose down`
# Adatok perzisztálva a `mysql-data` named volume-ban (compose down NEM törli).
# Tisztítás (mindent töröl): `docker compose down -v`
#
# Connection string a .env-be:
#   DATABASE_URL=mysql://compliance:compliance_dev_pw@127.0.0.1:3306/compliance_checker

services:
  mysql:
    # Pinned to 8.0 LTS: stabil, az `mysql2` npm-kliens out-of-the-box támogatja
    # a caching_sha2_password defaultot. (Az eredeti 8.4 + native-password flag
    # kombináció crash-elt, mert a flag-et a 8.4 eltávolította.)
    image: mysql:8.0
    container_name: compliance-checker-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: compliance_checker
      MYSQL_USER: compliance
      MYSQL_PASSWORD: compliance_dev_pw
      MYSQL_ROOT_PASSWORD: root_dev_pw
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_dev_pw"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

volumes:
  mysql-data:
